name: Build Test

on:
  push:
    branches-ignore:
      - "releases/v*"
    tags-ignore:
      - "*"
  pull_request:

jobs:
  build:
    name: Build ${{ matrix.package_format }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_format: apk
            cache_scope: snapshot
            sdk_url_path: https://downloads.openwrt.org/snapshots/targets/x86/64
          - package_format: ipk
            cache_scope: 24.10.5
            sdk_url_path: https://downloads.openwrt.org/releases/24.10.5/targets/x86/64
    env:
      SDK_URL_PATH: ${{ matrix.sdk_url_path }}
      ARCH: x86_64
      CACHE_DIR: ~/cache
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Cache
        uses: actions/cache@v4
        with:
          path: ${{ env.CACHE_DIR }}
          key: ${{ runner.os }}:openwrt-frp:${{ env.ARCH }}:${{ matrix.cache_scope }}:cache:${{ github.run_number }}
          restore-keys: |
            ${{ runner.os }}:openwrt-frp:${{ env.ARCH }}:${{ matrix.cache_scope }}:cache:

      - name: Install Dependencies
        run: |
          sudo apt-get update && \
            sudo apt-get install -yq gettext libncurses5-dev nodejs npm xsltproc zstd

      - name: Prepare SDK Home
        run: |
          echo "SDK_HOME=$(mktemp -d)" >> $GITHUB_ENV

      - name: Build package
        env:
          OPENWRT_GOLANG_COMMIT: ${{ secrets.OPENWRT_GOLANG_COMMIT }}
        run: sh compile.sh

      - name: Save Build Result
        uses: actions/upload-artifact@v4
        with:
          name: frp-${{ matrix.package_format }}
          path: |
            *.ipk
            *.apk
          if-no-files-found: error
          retention-days: 7
