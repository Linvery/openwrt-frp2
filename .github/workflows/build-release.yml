name: Build and Release

on:
  push:
    tags:
      - "*"

jobs:
  release:
    name: Build ${{ matrix.package_format }} for ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64_cortex-a53
            package_format: apk
            cache_scope: snapshot
            sdk_url_path: https://downloads.openwrt.org/snapshots/targets/bcm27xx/bcm2710
          - arch: aarch64_cortex-a72
            package_format: apk
            cache_scope: snapshot
            sdk_url_path: https://downloads.openwrt.org/snapshots/targets/mvebu/cortexa72
          - arch: aarch64_generic
            package_format: apk
            cache_scope: snapshot
            sdk_url_path: https://downloads.openwrt.org/snapshots/targets/layerscape/armv8_64b
          - arch: arm_arm1176jzf-s_vfp
            package_format: apk
            cache_scope: snapshot
            sdk_url_path: https://downloads.openwrt.org/snapshots/targets/bcm27xx/bcm2708
          - arch: arm_arm926ej-s
            package_format: apk
            cache_scope: snapshot
            sdk_url_path: https://downloads.openwrt.org/snapshots/targets/at91/sam9x
          - arch: arm_cortex-a15_neon-vfpv4
            package_format: apk
            cache_scope: snapshot
            sdk_url_path: https://downloads.openwrt.org/snapshots/targets/ipq806x/generic
          - arch: arm_cortex-a5-vfpv4
