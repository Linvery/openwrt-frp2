            sdk_url_path: https://downloads.openwrt.org/releases/24.10.5/targets/x86/generic
          - arch: mips64_octeonplus
            package_format: ipk
            cache_scope: 24.10.5
            sdk_url_path: https://downloads.openwrt.org/releases/24.10.5/targets/octeon/generic
          - arch: mipsel_24kc
            package_format: ipk
            cache_scope: 24.10.5
            sdk_url_path: https://downloads.openwrt.org/releases/24.10.5/targets/ramips/mt7620
          - arch: mipsel_24kc_24kf
            package_format: ipk
            cache_scope: 24.10.5
            sdk_url_path: https://downloads.openwrt.org/releases/24.10.5/targets/pistachio/generic
          - arch: mipsel_74kc
            package_format: ipk
            cache_scope: 24.10.5
            sdk_url_path: https://downloads.openwrt.org/releases/24.10.5/targets/bcm47xx/mips74k
          - arch: mipsel_mips32
            package_format: ipk
            cache_scope: 24.10.5
            sdk_url_path: https://downloads.openwrt.org/releases/24.10.5/targets/bcm47xx/generic
          - arch: mips_24kc
            package_format: ipk
            cache_scope: 24.10.5
            sdk_url_path: https://downloads.openwrt.org/releases/24.10.5/targets/ath79/generic
          - arch: x86_64
