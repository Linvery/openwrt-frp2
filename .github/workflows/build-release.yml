          # - arch: arc_arc700
          #   sdk_url_path: https://downloads.openwrt.org/snapshots/targets/arc770/generic
          #   sdk_name: -sdk-arc770-generic_
          # - arch: arc_archs
          #   sdk_url_path: https://downloads.openwrt.org/snapshots/targets/archs38/generic
          #   sdk_name: -sdk-archs38-generic_
          # - arch: armeb_xscale
          #   sdk_url_path: https://downloads.openwrt.org/snapshots/targets/ixp4xx/generic
          #   sdk_name: -sdk-ixp4xx-generic_
          # - arch: powerpc_464fp
          #   sdk_url_path: https://downloads.openwrt.org/snapshots/targets/apm821xx/nand
          #   sdk_name: -sdk-apm821xx-nand_
          # - arch: powerpc_8540
          #   sdk_url_path: https://downloads.openwrt.org/snapshots/targets/mpc85xx/generic
          #   sdk_name: -sdk-mpc85xx-generic_

    env:
      SDK_URL_PATH: ${{ matrix.sdk_url_path }}
      ARCH: ${{ matrix.arch }}
      CACHE_DIR: ~/cache
      DEFAULT_OPENWRT_GOLANG_COMMIT: ${{ matrix.package_format == 'ipk' && '5065a2ff8f2a1bcba6e445397f33ac16d76b3ad3' || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Cache
        uses: actions/cache@v4
        with:
          path: ${{ env.CACHE_DIR }}
          key: ${{ runner.os }}:openwrt-frp:${{ env.ARCH }}:${{ matrix.cache_scope }}:release:cache:${{ github.run_number }}
          restore-keys: |
            ${{ runner.os }}:openwrt-frp:${{ env.ARCH }}:${{ matrix.cache_scope }}:release:cache:
            ${{ runner.os }}:openwrt-frp:${{ env.ARCH }}:${{ matrix.cache_scope }}:cache:

      - name: Install Dependencies
        run: |
          sudo apt-get update && \
            sudo apt-get install -yq gettext libncurses5-dev nodejs npm xsltproc zstd

      - name: Prepare SDK Home
        run: |
          echo "SDK_HOME=$(mktemp -d)" >> $GITHUB_ENV

      - name: Build package
        env:
          OPENWRT_GOLANG_COMMIT: ${{ secrets.OPENWRT_GOLANG_COMMIT }}
        run: sh compile.sh

      - name: Normalize APK Asset Names
        if: matrix.package_format == 'apk'
        run: |
          for file in *.apk; do
            [ -e "$file" ] || continue
            mv "$file" "${file%.apk}-${ARCH}.apk"
          done

      - name: Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.ipk
            *.apk
